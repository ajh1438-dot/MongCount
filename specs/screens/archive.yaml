version: "2.0"

screen:
  id: S5
  name: 아카이브 리스트
  route: /archive
  priority: P1
  layout: mobile-list-with-bottom-tabs
  purpose: 최근 7일 쉼 기록 조회 (8일 이상은 Paywall 유도)

entry_paths:
  - from: S1
    trigger: 하단탭 [아카이브]

exit_paths:
  - to: S2
    trigger: 세션 카드 탭
    mode: readonly_replay
  - to: S10
    trigger: "[프리미엄으로 무제한 저장] 또는 8일 이상 스크롤"
  - to: S1
    trigger: 하단탭 [홈]

data_requirements:
  - resource: rest_sessions
    needs: [id, slot, started_at, duration_actual_sec, clarity, note, completed]
    scope: current_user
    filters: { started_at_gte: "now-7d" }
    sort: started_at desc
  - resource: subscriptions
    needs: [tier]
    scope: current_user
    note: 프리미엄 여부로 무제한 표시 결정

components:
  - id: header
    type: app_header
    position: top
    function: "아카이브 제목 + 검색 아이콘 + 필터 아이콘"
  - id: search_bar
    type: text_search
    position: top
    visible_when: search_open
    function: "한줄 기록 텍스트 검색 (client-side)"
  - id: filter_chips
    type: chip_group
    position: top
    function: "시간대 (아침/오후/저녁) + 집중도 (☀︎3 이상)"
    options:
      time_of_day: [all, morning, afternoon, evening]
      min_clarity: [any, 3, 4, 5]
  - id: session_list
    type: virtual_list
    position: main
    function: "날짜별 그룹핑 + 세션 카드"
    group_by: date
    data_source: { resource: rest_sessions }
    virtualization: enabled_over_50
  - id: session_card
    type: card
    function: "{time} · {clarity_dots} · {note_preview 40자} · 타이머 {duration}"
    action: navigate(S2, mode=readonly, session_id)
  - id: upgrade_cta
    type: secondary_button
    position: bottom_of_list
    visible_when: tier=free AND scrolled_to_bottom
    function: "[프리미엄으로 무제한 저장]"
    action: navigate(S10)
  - id: bottom_tabs
    type: bottom_tab_nav
    position: bottom

states:
  - name: default
    when: 기록 있음 (7일 내)
  - name: empty
    when: session count = 0
    component: empty-states.yaml#empty_archive
  - name: paywall_boundary
    when: tier=free AND 8일+ 기록 접근 시도
    action: navigate(S10)
  - name: searching
    when: search_bar active + query length > 0
    display: filter 적용된 결과만
  - name: offline
    when: navigator.onLine=false
    display: 캐시된 local IndexedDB 데이터만 표시

technical:
  data_source_priority: Dexie (local) → Supabase (cloud 동기화)
  virtualization: react-virtual 또는 shadcn equivalent
  search: 클라이언트 사이드 필터 (note 필드 ILIKE)
  grouping: date-fns로 "어제", "N일 전" 라벨

events:
  - trigger: session_card.tap
    action: navigate(S2, { mode: readonly, session_id })
  - trigger: search_icon.tap
    action: toggle(search_bar)
  - trigger: upgrade_cta.tap
    action: navigate(S10, { source: archive_boundary })

tests:
  - name: 7일 내 기록 목록
    when: 10개 세션 존재
    then: [날짜별 그룹 표시, 세션 카드 각각 렌더, 스크롤 가능]
  - name: 빈 상태
    when: session count = 0
    then: ["'아직 기록이 없어요'", "[지금 쉬기] CTA 노출"]
  - name: 8일 경계 Paywall
    when: free 유저 + 8일 이전 스크롤
    then: [S10 Paywall로 자동 네비게이트]
  - name: 검색 필터링
    when: query="프로젝트"
    then: [note에 "프로젝트" 포함된 세션만 표시]
  - name: 세션 상세 읽기 전용
    when: 세션 카드 탭
    then: [S2 readonly 모드 진입, abort_button 숨김]

accessibility:
  aria:
    session_card: "{date} {time}, 맑음 레벨 {clarity}, 내용: {note}"
    upgrade_cta: "프리미엄으로 무제한 저장"
  keyboard: 화살표 키로 목록 스크롤

